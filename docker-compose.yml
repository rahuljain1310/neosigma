services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentopt
      POSTGRES_PASSWORD: agentopt
      POSTGRES_DB: agentopt
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentopt"]
      interval: 2s
      timeout: 3s
      retries: 15

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override host-local DATABASE_URL from .env for in-compose networking.
      DATABASE_URL: postgresql+asyncpg://agentopt:agentopt@db:5432/agentopt
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      E2B_API_KEY: ${E2B_API_KEY:-}
      DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
      OPTIMIZER_MODE: ${OPTIMIZER_MODE:-auto}
      OPTIMIZER_MODEL: ${OPTIMIZER_MODEL:-gpt-5.4}
      AGENT_MODEL: ${AGENT_MODEL:-gpt-5.4}
      HARBOR_ENV_PROVIDER: ${HARBOR_ENV_PROVIDER:-docker}
    ports:
      - "8000:8000"
    volumes:
      # Let Harbor's docker provider talk to the host Docker daemon (Colima/Docker Desktop).
      - /var/run/docker.sock:/var/run/docker.sock
      - harness_data:/app/data/harness

volumes:
  pgdata:
  harness_data:
